name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Test
        run: go test ./... -count=1
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Check diff
        run: git diff --check
